version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mise_db
      POSTGRES_USER: mise_user
      POSTGRES_PASSWORD: mise_pass
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mise_user -d mise_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://mise_user:mise_pass@postgres:5432/mise_db
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 24h
      PORT: 4000
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:5173
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run db:migrate && node dist/index.js"

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  pgdata:
